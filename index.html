<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeedReader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>SpeedReader</h1>
      <button id="btn-settings" aria-label="Settings" title="Settings">⚙</button>
    </header>

    <section id="input-section">
      <textarea id="text-input" placeholder="Paste your text here..."></textarea>
      <div id="controls">
        <label for="wpm-input">WPM:
          <input type="number" id="wpm-input" value="300" min="50" max="1000" step="10" />
        </label>
        <button id="btn-start">Start</button>
        <button id="btn-fullscreen" aria-label="Enter fullscreen" title="Fullscreen">⛶</button>
      </div>
    </section>

    <section id="reader-section">
      <div id="word-display">
        <span id="word"></span>
      </div>
      <div id="progress">
        <span id="progress-text">0 / 0</span>
      </div>
      <div id="reader-controls">
        <button id="btn-reader-play">Start</button>
        <button id="btn-reader-fullscreen" aria-label="Exit fullscreen" title="Exit fullscreen">⛶</button>
      </div>
    </section>

    <aside id="settings-drawer" class="closed">
      <div class="drawer-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" aria-label="Close">×</button>
      </div>
      <div class="drawer-body">
        <label class="setting">
          <span>Theme</span>
          <select id="select-theme">
            <option value="default">Red (default)</option>
            <option value="amber">Amber</option>
            <option value="cyan">Cyan</option>
          </select>
        </label>
        <label class="setting">
          <span>Font</span>
          <select id="select-font">
            <option value="serif">Serif</option>
            <option value="sans">Sans-serif</option>
            <option value="mono">Monospace</option>
          </select>
        </label>
        <label class="setting">
          <span>Guide line width: <output id="out-guide-width">1</output>px</span>
          <input type="range" id="range-guide-width" min="1" max="6" step="1" value="1" />
        </label>
        <label class="setting">
          <span>Guide line length: <output id="out-guide-length">30</output>px</span>
          <input type="range" id="range-guide-length" min="10" max="120" step="5" value="30" />
        </label>
        <label class="setting">
          <span>Guide line offset: <output id="out-guide-offset">25</output>%</span>
          <input type="range" id="range-guide-offset" min="0" max="45" step="1" value="25" />
        </label>
        <label class="setting">
          <span>Comma pause: <output id="out-pause-comma">1.5</output>×</span>
          <input type="range" id="range-pause-comma" min="1" max="4" step="0.1" value="1.5" />
        </label>
        <label class="setting">
          <span>Period pause: <output id="out-pause-period">2.0</output>×</span>
          <input type="range" id="range-pause-period" min="1" max="4" step="0.1" value="2.0" />
        </label>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
