<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeedReader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>SpeedReader</h1>
      <button id="btn-settings" aria-label="Settings" title="Settings">⚙</button>
    </header>

    <section id="input-section">
      <textarea id="text-input" placeholder="Paste your text here..."></textarea>
      <div id="controls">
        <label for="wpm-input">WPM:
          <input type="number" id="wpm-input" value="300" min="50" max="1000" step="10" />
        </label>
        <button id="btn-start">Start</button>
        <button id="btn-pause" disabled>Pause</button>
        <button id="btn-stop" disabled>Stop</button>
      </div>
    </section>

    <section id="reader-section">
      <div id="word-display">
        <span id="word"></span>
      </div>
      <div id="progress">
        <span id="progress-text">0 / 0</span>
      </div>
      <div id="reader-controls">
        <button id="btn-reader-pause">Pause</button>
        <button id="btn-reader-exit">Exit</button>
      </div>
    </section>

    <aside id="settings-drawer" class="closed">
      <div class="drawer-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" aria-label="Close">×</button>
      </div>
      <div class="drawer-body">
        <label class="setting">
          <span>Theme</span>
          <select id="select-theme">
            <option value="default">Red (default)</option>
            <option value="amber">Amber</option>
            <option value="cyan">Cyan</option>
          </select>
        </label>
        <label class="setting">
          <span>Font</span>
          <select id="select-font">
            <option value="serif">Serif</option>
            <option value="sans">Sans-serif</option>
            <option value="mono">Monospace</option>
          </select>
        </label>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
